name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 3.0.0). Leave empty for build-only test without creating a release.'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_format: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            archive_format: tar.gz
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: amd64
            archive_format: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            archive_format: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            archive_format: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install ARM64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          if [ -n "${{ matrix.cc }}" ]; then
            export CC="${{ matrix.cc }}"
          fi
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          go build -v -trimpath \
            -ldflags "-s -w -X github.com/DaRealFreak/watcher-go/internal/version.version=${{ steps.version.outputs.version }}" \
            -o "watcher${EXT}" .

      - name: Create archive
        shell: bash
        run: |
          ARCHIVE_NAME="watcher-go-v${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            7z a "${ARCHIVE_NAME}.zip" "watcher${EXT}" README.md LICENSE
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" "watcher${EXT}" README.md LICENSE
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: watcher-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: watcher-go-v*.${{ matrix.archive_format }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.version != ''

    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag for manual dispatch
        if: inputs.version != ''
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum watcher-go-v* > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
